<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>🎯 Dart Scorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #080810;
    --surface: #10101e;
    --surface2: #161628;
    --border: #1e1e40;
    --accent: #00d4ff;
    --accent2: #e8c84a;
    --green: #00c97a;
    --red: #ff3d5a;
    --text: #e8e8f0;
    --muted: #555570;
    --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Barlow Condensed', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; overflow-x: hidden; }

/* NAV */
nav {
position: sticky; top: 0; z-index: 200;
background: rgba(8,8,16,0.97);
border-bottom: 1px solid var(--border);
display: flex; align-items: center; justify-content: space-between;
padding: 12px 18px;
backdrop-filter: blur(12px);
}
.nav-logo { font-family: var(--font-display); font-weight: 900; font-size: 22px; letter-spacing: 4px; color: var(--accent); }
.nav-tabs { display: flex; gap: 6px; }
.tab-btn {
font-family: var(--font-mono); font-size: 11px; letter-spacing: 1.5px;
padding: 7px 14px; border-radius: 6px; cursor: pointer;
border: 1px solid var(--border); background: transparent; color: var(--muted);
transition: all .2s;
}
.tab-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }

/* SCREENS */
.screen { display: none; max-width: 540px; margin: 0 auto; padding: 20px 16px 80px; }
.screen.active { display: block; }

/* SETUP */
.section-label { font-size: 10px; letter-spacing: 2.5px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
.input-row { display: flex; gap: 10px; margin-bottom: 22px; }
.dart-input {
flex: 1; background: var(--surface); border: 1px solid var(--border);
border-radius: 9px; padding: 12px 14px; color: var(--text);
font-family: var(--font-mono); font-size: 15px; outline: none;
transition: border-color .2s;
}
.dart-input:focus { border-color: var(--accent); }
.option-row { display: flex; gap: 8px; margin-bottom: 22px; }
.opt-btn {
flex: 1; font-family: var(--font-mono); font-size: 13px; font-weight: 700;
padding: 13px 8px; border-radius: 9px; cursor: pointer;
border: 1px solid var(--border); background: var(--surface); color: var(--muted);
transition: all .2s; letter-spacing: 1px;
}
.opt-btn.active-score { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.opt-btn.active-in { background: var(--green); color: var(--bg); border-color: var(--green); }
.opt-btn.active-out { background: var(--red); color: #fff; border-color: var(--red); }
.start-btn {
width: 100%; font-family: var(--font-display); font-weight: 900; font-size: 20px;
letter-spacing: 4px; padding: 18px; border: none; border-radius: 12px;
background: linear-gradient(135deg, #0066aa, var(--accent));
color: #fff; cursor: pointer;
box-shadow: 0 4px 24px rgba(0,212,255,0.25);
transition: transform .15s, box-shadow .15s;
}
.start-btn:active { transform: scale(0.98); }

/* GAME */
.score-row { display: flex; gap: 10px; margin-bottom: 14px; }
.player-card {
flex: 1; background: var(--surface); border: 1.5px solid var(--border);
border-radius: 14px; padding: 14px 12px; transition: all .3s;
}
.player-card.active-player {
border-color: var(--accent); background: var(--surface2);
box-shadow: 0 0 20px rgba(0,212,255,0.12);
}
.p-name { font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-bottom: 4px; }
.p-score { font-family: var(--font-display); font-weight: 900; font-size: 46px; line-height: 1; color: var(--text); }
.p-score.zero { color: var(--green); }
.p-meta { font-size: 11px; color: var(--muted); margin-top: 5px; }
.p-need-in { font-size: 10px; color: var(--accent2); margin-top: 4px; }
.throw-track { display: flex; gap: 5px; margin-top: 10px; }
.throw-slot {
flex: 1; height: 26px; border-radius: 5px;
background: var(--bg); border: 1px solid var(--border);
display: flex; align-items: center; justify-content: center;
font-size: 10px; font-weight: 700; transition: all .2s;
}
.throw-slot.hit { background: #0a2a1a; border-color: var(--green); color: var(--green); }
.throw-slot.bust { background: #2a0a10; border-color: var(--red); color: var(--red); }
.throw-slot.noin { background: #2a2a00; border-color: var(--accent2); color: var(--accent2); }

.checkout-hint {
background: #1a1800; border: 1px solid var(--accent2); border-radius: 8px;
padding: 9px 14px; margin-bottom: 12px;
display: flex; align-items: center; gap: 8px; font-size: 13px;
}

/* DARTBOARD */
.board-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
#dartboard { touch-action: none; }
.multiplier-panel {
background: var(--surface2); border: 1px solid var(--accent);
border-radius: 13px; padding: 12px 16px;
display: flex; align-items: center; gap: 10px;
box-shadow: 0 0 20px rgba(0,212,255,0.15);
animation: slideUp .15s ease;
}
@keyframes slideUp { from { opacity:0; transform:translateY(6px)} to{opacity:1;transform:translateY(0)}}
.mult-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
.mult-btn {
font-family: var(--font-mono); font-weight: 700; font-size: 12px;
padding: 9px 0; border-radius: 8px; cursor: pointer;
border: 1.5px solid; display: flex; flex-direction: column;
align-items: center; gap: 2px; width: 60px; transition: transform .1s;
}
.mult-btn:active { transform: scale(0.93); }
.mult-s { background: #0a1e36; border-color: var(--accent); color: var(--accent); }
.mult-d { background: #0a2a16; border-color: var(--green); color: var(--green); }
.mult-t { background: #2a0a18; border-color: var(--red); color: var(--red); }
.mult-btn span.pts { font-size: 10px; opacity: 0.65; }
.mult-cancel { background: none; border: 1px solid #333; color: var(--muted); border-radius: 7px; padding: 7px 10px; cursor: pointer; font-size: 13px; }

.action-row { display: flex; gap: 8px; margin-top: 12px; }
.act-btn {
flex: 1; font-family: var(--font-mono); font-size: 12px; font-weight: 700;
padding: 13px 6px; border-radius: 9px; cursor: pointer; letter-spacing: 1px;
transition: opacity .15s; border: 1px solid;
}
.act-btn:active { opacity: 0.7; }
.btn-miss { background: #1a0608; border-color: var(--red); color: var(--red); }
.btn-undo { background: var(--surface); border-color: #333; color: var(--muted); }
.btn-skip { background: var(--surface); border-color: #333; color: var(--muted); }

/* WINNER */
.winner-banner {
background: linear-gradient(135deg, #0a2a18, #0d3d22);
border: 1.5px solid var(--green); border-radius: 14px;
padding: 24px; margin-bottom: 20px; text-align: center;
box-shadow: 0 0 30px rgba(0,201,122,0.2);
animation: popIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)}}
.winner-trophy { font-size: 42px; margin-bottom: 6px; }
.winner-name { font-family: var(--font-display); font-weight: 900; font-size: 28px; letter-spacing: 3px; color: var(--green); }
.winner-sub { color: #7addb0; font-size: 13px; margin-top: 6px; }
.new-game-btn {
margin-top: 16px; background: var(--green); color: var(--bg);
border: none; border-radius: 9px; padding: 12px 28px;
font-family: var(--font-mono); font-weight: 700; font-size: 13px;
cursor: pointer; letter-spacing: 1px;
}

/* STATS */
.stats-cards { display: flex; gap: 10px; margin-bottom: 20px; }
.stat-card {
flex: 1; background: var(--surface); border: 1px solid var(--border);
border-radius: 13px; padding: 14px;
}
.stat-card-name { font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; }
.stat-item-label { font-size: 9px; color: #44445a; letter-spacing: 1px; text-transform: uppercase; }
.stat-item-val { font-family: var(--font-display); font-weight: 900; font-size: 22px; line-height: 1.1; margin-top: 1px; }
.chart-card {
background: var(--surface); border: 1px solid var(--border);
border-radius: 13px; padding: 16px; margin-bottom: 14px;
}
.chart-card-title { font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-bottom: 14px; }
.recent-game {
display: flex; justify-content: space-between; align-items: center;
padding: 9px 0; border-bottom: 1px solid var(--border);
}
.rg-winner { color: var(--green); font-weight: 700; font-size: 13px; }
.rg-loser { color: var(--muted); font-size: 11px; }
.rg-meta { text-align: right; font-size: 11px; color: var(--accent); }
.rg-date { font-size: 10px; color: var(--muted); }

.pdf-btn {
width: 100%; margin-top: 20px; font-family: var(--font-display); font-weight: 900;
font-size: 17px; letter-spacing: 3px; padding: 16px; border: none; border-radius: 12px;
background: linear-gradient(135deg, #2a1a00, var(--accent2));
color: #fff; cursor: pointer;
box-shadow: 0 4px 20px rgba(232,200,74,0.2);
transition: transform .15s;
}
.pdf-btn:active { transform: scale(0.98); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 52px; margin-bottom: 12px; }
.empty-text { font-size: 12px; letter-spacing: 2px; }
</style>

</head>
<body>

<nav>
  <div class="nav-logo">🎯 DART</div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showScreen('setup')">SETUP</button>
    <button class="tab-btn" onclick="showScreen('game')">SPIEL</button>
    <button class="tab-btn" onclick="showScreen('stats')">STATS</button>
  </div>
</nav>

<div id="screen-setup" class="screen active">
  <div class="section-label">Spieler</div>
  <div class="input-row">
    <input class="dart-input" id="name1" placeholder="Spieler 1" value=""/>
    <input class="dart-input" id="name2" placeholder="Spieler 2" value=""/>
  </div>
  <div class="section-label">Startpunkte</div>
  <div class="option-row" id="score-opts">
    <button class="opt-btn" onclick="setOpt('score',301,this)">301</button>
    <button class="opt-btn active-score" onclick="setOpt('score',501,this)">501</button>
    <button class="opt-btn" onclick="setOpt('score',401,this)">401</button>
  </div>
  <div class="section-label">Check-In</div>
  <div class="option-row" id="in-opts">
    <button class="opt-btn active-in" onclick="setOpt('in','Normal',this)">Normal</button>
    <button class="opt-btn" onclick="setOpt('in','Double',this)">Double In</button>
    <button class="opt-btn" onclick="setOpt('in','Triple',this)">Triple In</button>
  </div>
  <div class="section-label">Check-Out</div>
  <div class="option-row" id="out-opts">
    <button class="opt-btn" onclick="setOpt('out','Normal',this)">Normal</button>
    <button class="opt-btn active-out" onclick="setOpt('out','Double',this)">Double Out</button>
    <button class="opt-btn" onclick="setOpt('out','Triple',this)">Triple Out</button>
  </div>
  <button class="start-btn" onclick="startGame()">SPIEL STARTEN</button>
</div>

<div id="screen-game" class="screen">
  <div id="winner-area"></div>
  <div class="score-row" id="score-row">
    </div>
  <div id="checkout-hint"></div>
  <div class="board-wrap">
    <svg id="dartboard" width="320" height="320" viewBox="0 0 320 320"></svg>
    <div id="mult-panel" style="display:none" class="multiplier-panel"></div>
  </div>
  <div class="action-row">
    <button class="act-btn btn-miss" onclick="recordMiss()">MISS</button>
    <button class="act-btn btn-undo" onclick="undoLast()">↩ UNDO</button>
    <button class="act-btn btn-skip" onclick="skipTurn()">SKIP</button>
  </div>
</div>

<div id="screen-stats" class="screen">
  <div id="stats-content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════════════════════
const SECTORS = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
const CHECKOUT_HINTS = {
  170:"T20 T20 Bull",160:"T20 T20 D20",141:"T20 T19 D12",140:"T20 T20 D10",
  130:"T20 T20 D5",121:"T20 T11 D14",120:"T20 S20 D20",
  100:"T20 D20",99:"T19 S10 D16",98:"T20 D19",97:"T19 D20",96:"T20 D18",
  95:"T19 D19",94:"T18 D20",93:"T19 D18",92:"T20 D16",91:"T17 D20",
  90:"T18 D18",89:"T19 D16",88:"T20 D14",87:"T17 D18",86:"T18 D16",
  85:"T15 D20",84:"T20 D12",83:"T17 D16",82:"T14 D20",81:"T19 D12",
  80:"T16 D16",79:"T19 D12",78:"T18 D12",77:"T19 D10",76:"T20 D8",
  75:"T17 D12",74:"T14 D16",73:"T19 D8",72:"T16 D12",71:"T13 D16",
  70:"T18 D8",69:"T19 D6",68:"T20 D4",67:"T17 D8",66:"T14 D12",
  65:"T19 D4",64:"T16 D8",63:"T17 D6",62:"T10 D16",61:"T15 D8",
  60:"S20 D20",50:"Bull",40:"D20",38:"D19",36:"D18",34:"D17",32:"D16",
  30:"D15",28:"D14",26:"D13",24:"D12",22:"D11",20:"D10",18:"D9",
  16:"D8",14:"D7",12:"D6",10:"D5",8:"D4",6:"D3",4:"D2",2:"D1"
};

let settings = { score: 501, inRule: 'Double', outRule: 'Double' };
let game = null;
let stats = loadStats();
let selectedSector = null;
let chartWins = null, chartAvg = null;

function loadStats() {
  try { return JSON.parse(localStorage.getItem('dart_stats')) || { players:{}, games:[] }; }
  catch { return { players:{}, games:[] }; }
}
function saveStats() {
  localStorage.setItem('dart_stats', JSON.stringify(stats));
}
function loadNames() {
  try { return JSON.parse(localStorage.getItem('dart_names')) || {p1:'Spieler 1',p2:'Spieler 2'}; }
  catch { return {p1:'Spieler 1',p2:'Spieler 2'}; }
}

// Init names from storage
window.addEventListener('DOMContentLoaded', () => {
  const n = loadNames();
  document.getElementById('name1').value = n.p1;
  document.getElementById('name2').value = n.p2;
  document.getElementById('name1').addEventListener('change', saveNameInputs);
  document.getElementById('name2').addEventListener('change', saveNameInputs);
  drawBoard();
});
function saveNameInputs() {
  localStorage.setItem('dart_names', JSON.stringify({
    p1: document.getElementById('name1').value || 'Spieler 1',
    p2: document.getElementById('name2').value || 'Spieler 2'
  }));
}

// ═══════════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'stats') renderStats();
}

// ═══════════════════════════════════════════════════════════════
// SETUP OPTIONS
// ═══════════════════════════════════════════════════════════════
function setOpt(type, val, btn) {
  if (type === 'score') {
    settings.score = val;
    document.querySelectorAll('#score-opts .opt-btn').forEach(b => b.classList.remove('active-score'));
    btn.classList.add('active-score');
  } else if (type === 'in') {
    settings.inRule = val;
    document.querySelectorAll('#in-opts .opt-btn').forEach(b => b.classList.remove('active-in'));
    btn.classList.add('active-in');
  } else {
    settings.outRule = val;
    document.querySelectorAll('#out-opts .opt-btn').forEach(b => b.classList.remove('active-out'));
    btn.classList.add('active-out');
  }
}

// ═══════════════════════════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════════════════════════
function startGame() {
  saveNameInputs();
  const n = loadNames();
  game = {
    startScore: settings.score,
    inRule: settings.inRule,
    outRule: settings.outRule,
    current: 0,
    winner: null,
    players: [
      { name: n.p1, score: settings.score, darts: [], turns: 0, isIn: settings.inRule === 'Normal', currentThrow: [] },
      { name: n.p2, score: settings.score, darts: [], turns: 0, isIn: settings.inRule === 'Normal', currentThrow: [] },
    ]
  };
  selectedSector = null;
  document.getElementById('mult-panel').style.display = 'none';
  document.getElementById('winner-area').innerHTML = '';
  renderGame();
  // Switch to game tab
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===1));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-game').classList.add('active');
}

function handleScore(pts, label) {
  if (!game || game.winner !== null) return;
  const p = game.players[game.current];
  if (p.currentThrow.length >= 3) return;

  // Check-in
  if (!p.isIn) {
    const valid = game.inRule === 'Double' ? label.startsWith('D') || label === 'Bull' :
                  game.inRule === 'Triple' ? label.startsWith('T') : true;
    if (!valid) {
      p.currentThrow.push({ pts:0, label, type:'noin' });
      if (p.currentThrow.length === 3) advanceTurn();
      renderGame(); return;
    }
    p.isIn = true;
  }

  const newScore = p.score - pts;
  if (newScore < 0 || newScore === 1) {
    p.currentThrow.push({ pts:0, label, type:'bust' });
    if (p.currentThrow.length === 3) advanceTurn();
    renderGame(); return;
  }

  if (newScore === 0) {
    const validOut = game.outRule === 'Normal' ||
      (game.outRule === 'Double' && (label.startsWith('D') || label === 'Bull')) ||
      (game.outRule === 'Triple' && label.startsWith('T'));
    if (!validOut) {
      p.currentThrow.push({ pts:0, label, type:'bust' });
      if (p.currentThrow.length === 3) advanceTurn();
      renderGame(); return;
    }
    p.score = 0;
    p.currentThrow.push({ pts, label, type:'hit' });
    p.darts.push(...p.currentThrow);
    p.turns++;
    game.winner = game.current;
    renderGame();
    finishGame();
    return;
  }

  p.score = newScore;
  p.currentThrow.push({ pts, label, type:'hit' });
  p.darts.push({ pts, label, type:'hit' });
  if (p.currentThrow.length === 3) advanceTurn();
  renderGame();
}

function advanceTurn() {
  const p = game.players[game.current];
  p.turns++;
  p.currentThrow = [];
  game.current = game.current === 0 ? 1 : 0;
}

function recordMiss() { handleScore(0, 'Miss'); }

function undoLast() {
  if (!game || game.winner !== null) return;
  const p = game.players[game.current];
  if (p.currentThrow.length === 0) return;
  const last = p.currentThrow.pop();
  if (last.type === 'hit') {
    p.score += last.pts;
    p.darts.pop();
  }
  selectedSector = null;
  document.getElementById('mult-panel').style.display = 'none';
  renderGame();
}

function skipTurn() {
  if (!game || game.winner !== null) return;
  advanceTurn();
  selectedSector = null;
  document.getElementById('mult-panel').style.display = 'none';
  renderGame();
}

function finishGame() {
  const w = game.players[game.winner];
  const l = game.players[game.winner === 0 ? 1 : 0];
  const calcP = (p) => {
    const real = p.darts.filter(d => d.type === 'hit');
    const total = real.reduce((s,d) => s+d.pts, 0);
    const avg = p.turns > 0 ? Math.round(total/p.turns*10)/10 : 0;
    const checkout = p.darts.length > 0 ? p.darts[p.darts.length-1].label : '';
    return { avg, checkout };
  };
  const ws = calcP(w), ls = calcP(l);
  const rec = {
    date: new Date().toISOString(),
    startScore: game.startScore,
    winner: w.name, loser: l.name,
    winnerTurns: w.turns, loserTurns: l.turns,
    winnerAvg: ws.avg, loserAvg: ls.avg,
    winnerCheckout: ws.checkout,
  };
  stats.games.push(rec);
  [w.name, l.name].forEach(name => {
    if (!stats.players[name]) stats.players[name] = { wins:0, losses:0, totalAvg:0, gameCount:0, bestGame:null, checkouts:0 };
  });
  const wp = stats.players[w.name];
  wp.wins++; wp.totalAvg += ws.avg; wp.gameCount++; wp.checkouts++;
  if (!wp.bestGame || w.turns < wp.bestGame) wp.bestGame = w.turns;
  const lp = stats.players[l.name];
  lp.losses++; lp.totalAvg += ls.avg; lp.gameCount++;
  saveStats();
}

// ═══════════════════════════════════════════════════════════════
// RENDER GAME UI
// ═══════════════════════════════════════════════════════════════
function renderGame() {
  if (!game) return;
  const scoreRow = document.getElementById('score-row');
  scoreRow.innerHTML = game.players.map((p,i) => {
    const real = p.darts.filter(d=>d.type==='hit');
    const total = real.reduce((s,d)=>s+d.pts,0);
    const avg = p.turns>0 ? Math.round(total/p.turns*10)/10 : 0;
    const slots = [0,1,2].map(di => {
      const d = i===game.current ? p.currentThrow[di] : null;
      const cls = d ? (d.type==='bust'?'bust':d.type==='noin'?'noin':'hit') : '';
      const txt = d ? (d.type==='bust'?'BUST':d.type==='noin'?'NO IN':d.label) : '·';
      return `<div class="throw-slot ${cls}">${txt}</div>`;
    }).join('');
    const isActive = game.current===i && !game.winner;
    return `<div class="player-card ${isActive?'active-player':''}">
      <div class="p-name">${isActive?'▶ ':''}${p.name.toUpperCase()}</div>
      <div class="p-score ${p.score===0?'zero':''}">${p.score}</div>
      <div class="p-meta">${p.turns} Aufn. ${avg>0?'· Ø '+avg:''}</div>
      ${!p.isIn?`<div class="p-need-in">CHECK-IN nötig</div>`:''}
      <div class="throw-track">${slots}</div>
    </div>`;
  }).join('');

  // Checkout hint
  const cp = game.players[game.current];
  const hint = cp && cp.score <= 170 && CHECKOUT_HINTS[cp.score];
  document.getElementById('checkout-hint').innerHTML = hint && !game.winner
    ? `<div class="checkout-hint"><span style="color:var(--accent2)">💡</span><span style="color:var(--accent2)">Checkout:</span><strong style="margin-left:4px">${hint}</strong></div>`
    : '';

  // Winner
  if (game.winner !== null) {
    const w = game.players[game.winner];
    const co = w.darts.length > 0 ? w.darts[w.darts.length-1].label : '';
    document.getElementById('winner-area').innerHTML = `
      <div class="winner-banner">
        <div class="winner-trophy">🏆</div>
        <div class="winner-name">${w.name} GEWINNT!</div>
        <div class="winner-sub">${w.turns} Aufnahmen · Checkout: ${co}</div>
        <button class="new-game-btn" onclick="showSetup()">NEUES SPIEL</button>
      </div>`;
    document.getElementById('dartboard').style.opacity = '0.3';
    document.getElementById('mult-panel').style.display = 'none';
  } else {
    document.getElementById('dartboard').style.opacity = '1';
  }
}

function showSetup() {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-setup').classList.add('active');
}

// ═══════════════════════════════════════════════════════════════
// SVG DARTBOARD
// ═══════════════════════════════════════════════════════════════
function drawBoard() {
  const svg = document.getElementById('dartboard');
  const cx=160, cy=160;
  const rings = [
    { r1:22,  r2:90,  type:'single'  },
    { r1:90,  r2:105, type:'triple'  },
    { r1:105, r2:130, type:'single2' },
    { r1:130, r2:145, type:'double'  },
  ];
  const evenColors = { single:'#10101e', triple:'#00c97a', single2:'#10101e', double:'#00c97a' };
  const oddColors  = { single:'#e8e8f0', triple:'#ff3d5a', single2:'#e8e8f0', double:'#ff3d5a' };
  let html = `<defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%"><stop offset="0%" stop-color="#1a1a30"/><stop offset="100%" stop-color="#08080f"/></radialGradient>
  </defs>
  <circle cx="${cx}" cy="${cy}" r="158" fill="#050508"/>
  <circle cx="${cx}" cy="${cy}" r="150" fill="url(#bgGrad)"/>`;

  SECTORS.forEach((num, i) => {
    const slice = 360/20;
    const sa = i*slice - slice/2, ea = sa+slice;
    rings.forEach(ring => {
      const even = i%2===0;
      const fill = even ? evenColors[ring.type] : oddColors[ring.type];
      const path = arcPath(cx,cy,ring.r1,ring.r2,sa,ea);
      const clickType = ring.type==='triple'?'T':ring.type==='double'?'D':'S';
      html += `<path d="${path}" fill="${fill}" stroke="#08080f" stroke-width="0.6"
        onclick="boardClick(${num},'${clickType}')" style="cursor:pointer" id="seg-${num}-${clickType}"/>`;
    });
  });

  // Number labels (between double and outer edge)
  SECTORS.forEach((num, i) => {
    const slice = 360/20;
    const angle = i*slice;
    const [lx,ly] = polar(cx,cy,angle,138);
    html += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle"
      fill="#fff" font-size="8.5" font-weight="700" font-family="'Share Tech Mono',monospace"
      style="pointer-events:none;user-select:none">${num}</text>`;
  });

  // Outer bull (25)
  html += `<circle cx="${cx}" cy="${cy}" r="22" fill="#ff3d5a" stroke="#08080f" stroke-width="0.8"
    onclick="boardClick(null,'BULL50')" style="cursor:pointer"/>`;
  // Inner bull (50)
  html += `<circle cx="${cx}" cy="${cy}" r="12" fill="#e8c84a" stroke="#08080f" stroke-width="0.8"
    onclick="boardClick(null,'BULL')" style="cursor:pointer"/>`;
  html += `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle"
    fill="#000" font-size="6.5" font-weight="900" font-family="'Share Tech Mono',monospace"
    style="pointer-events:none">BULL</text>`;

  svg.innerHTML = html;
}

function polar(cx,cy,angleDeg,r) {
  const a = (angleDeg-90)*Math.PI/180;
  return [cx+r*Math.cos(a), cy+r*Math.sin(a)];
}
function arcPath(cx,cy,r1,r2,sa,ea) {
  const [x1,y1]=polar(cx,cy,sa,r1), [x2,y2]=polar(cx,cy,ea,r1);
  const [x3,y3]=polar(cx,cy,ea,r2), [x4,y4]=polar(cx,cy,sa,r2);
  const lf = (ea-sa)>180?1:0;
  return `M${x1} ${y1} A${r1} ${r1} 0 ${lf} 1 ${x2} ${y2} L${x3} ${y3} A${r2} ${r2} 0 ${lf} 0 ${x4} ${y4}Z`;
}

function boardClick(num, type) {
  if (!game || game.winner !== null) return;
  // Bulls
  if (type === 'BULL') { flashSeg(null,'BULL'); handleScore(50,'Bull'); return; }
  if (type === 'BULL50') { flashSeg(null,'BULL50'); handleScore(25,'Bull25'); return; }
  // Double/Triple — score immediately
  if (type === 'T') { flashSeg(num,'T'); handleScore(num*3,`T${num}`); return; }
  if (type === 'D') { flashSeg(num,'D'); handleScore(num*2,`D${num}`); return; }
  // Single — show multiplier panel
  selectedSector = num;
  showMultPanel(num);
}

function showMultPanel(num) {
  const panel = document.getElementById('mult-panel');
  panel.style.display = 'flex';
  panel.innerHTML = `
    <span class="mult-label">Sektor <strong>${num}</strong></span>
    <button class="mult-btn mult-s" onclick="confirmMult('S',${num})">
      <span>Single</span><span>S${num}</span><span class="pts">(${num})</span>
    </button>
    <button class="mult-btn mult-d" onclick="confirmMult('D',${num})">
      <span>Double</span><span>D${num}</span><span class="pts">(${num*2})</span>
    </button>
    <button class="mult-btn mult-t" onclick="confirmMult('T',${num})">
      <span>Triple</span><span>T${num}</span><span class="pts">(${num*3})</span>
    </button>
    <button class="mult-cancel" onclick="cancelMult()">✕</button>`;
}

function confirmMult(m, num) {
  const pts = m==='S'?num:m==='D'?num*2:num*3;
  flashSeg(num, m);
  document.getElementById('mult-panel').style.display = 'none';
  selectedSector = null;
  handleScore(pts, `${m}${num}`);
}

function cancelMult() {
  document.getElementById('mult-panel').style.display = 'none';
  selectedSector = null;
}

function flashSeg(num, type) {
  const id = type==='BULL'||type==='BULL50' ? null : `seg-${num}-${type==='S'?'S':type}`;
  if (!id) return;
  const el = document.getElementById(id);
  if (!el) return;
  const orig = el.getAttribute('fill');
  el.setAttribute('fill','#f0c040');
  setTimeout(() => el.setAttribute('fill', orig), 250);
}

// ═══════════════════════════════════════════════════════════════
// STATS RENDER
// ═══════════════════════════════════════════════════════════════
function renderStats() {
  const n = loadNames();
  const players = [n.p1, n.p2];
  const games = stats.games || [];
  const el = document.getElementById('stats-content');

  if (games.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">NOCH KEINE SPIELE</div></div>`;
    return;
  }

  const getPS = (name) => {
    const p = stats.players?.[name] || {};
    const gc = (p.wins||0)+(p.losses||0);
    return {
      wins: p.wins||0, losses: p.losses||0, games: gc,
      avg: gc>0 ? Math.round(p.totalAvg/gc*10)/10 : 0,
      bestGame: p.bestGame||'–', checkouts: p.checkouts||0,
      wr: gc>0 ? Math.round((p.wins||0)/gc*100) : 0,
    };
  };

  const cards = players.map(name => {
    const s = getPS(name);
    return `<div class="stat-card">
      <div class="stat-card-name">${name.toUpperCase()}</div>
      <div class="stat-grid">
        ${[['Siege',s.wins,'var(--green)'],['Spiele',s.games,'var(--accent)'],
           ['Siegquote',s.wr+'%','var(--accent2)'],['Ø/Aufnahme',s.avg,'var(--text)'],
           ['Best Game',s.bestGame+' Auf.','var(--red)'],['Checkouts',s.checkouts,'var(--green)'],
        ].map(([l,v,c])=>`<div><div class="stat-item-label">${l}</div><div class="stat-item-val" style="color:${c}">${v}</div></div>`).join('')}
      </div>
    </div>`;
  }).join('');

  const recent = games.slice(-8).reverse().map(g => `
    <div class="recent-game">
      <div><div class="rg-winner">${g.winner}</div><div class="rg-loser">vs ${g.loser}</div></div>
      <div><div class="rg-meta">${g.startScore} · ${g.winnerTurns} Aufn.</div><div class="rg-date">${new Date(g.date).toLocaleDateString('de-DE')}</div></div>
    </div>`).join('');

  el.innerHTML = `
    <div class="stats-cards">${cards}</div>
    <div class="chart-card">
      <div class="chart-card-title">SIEGE VS NIEDERLAGEN</div>
      <canvas id="chartWins" height="130"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">Ø PRO AUFNAHME – VERLAUF</div>
      <canvas id="chartAvg" height="130"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">LETZTE SPIELE</div>
      ${recent}
    </div>
    <button class="pdf-btn" onclick="exportPDF()">📄 PDF EXPORTIEREN</button>`;

  // Build charts
  setTimeout(() => {
    if (chartWins) chartWins.destroy();
    if (chartAvg) chartAvg.destroy();

    const winsData = { labels: players, datasets: [
      { label:'Siege', data: players.map(n=>getPS(n).wins), backgroundColor:'#00c97a', borderRadius:5 },
      { label:'Niederlagen', data: players.map(n=>getPS(n).losses), backgroundColor:'#ff3d5a', borderRadius:5 },
    ]};
    chartWins = new Chart(document.getElementById('chartWins'), {
      type:'bar', data: winsData,
      options: { responsive:true, plugins:{ legend:{ labels:{ color:'#888', font:{family:'Share Tech Mono',size:10}}}},
        scales:{ x:{ticks:{color:'#888',font:{family:'Share Tech Mono',size:10}},grid:{color:'#1e1e40'}},
                 y:{ticks:{color:'#555'},grid:{color:'#1e1e40'}} }}
    });

    const last10 = games.slice(-10);
    const avgData = { labels: last10.map((_,i)=>`#${i+1}`), datasets: players.map((name,i) => ({
      label: name,
      data: last10.map(g => g.winner===name ? g.winnerAvg : g.loser===name ? g.loserAvg : null),
      borderColor: i===0?'#00d4ff':'#e8c84a', backgroundColor:'transparent',
      borderWidth:2, pointRadius:3, tension:0.3,
    }))};
    chartAvg = new Chart(document.getElementById('chartAvg'), {
      type:'line', data: avgData,
      options: { responsive:true, plugins:{ legend:{ labels:{ color:'#888', font:{family:'Share Tech Mono',size:10}}}},
        scales:{ x:{ticks:{color:'#555',font:{size:10}},grid:{color:'#1e1e40'}},
                 y:{ticks:{color:'#555'},grid:{color:'#1e1e40'}} }}
    });
  }, 50);
}

// ═══════════════════════════════════════════════════════════════
// PDF EXPORT
// ═══════════════════════════════════════════════════════════════
async function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const n = loadNames();
  const players = [n.p1, n.p2];
  const now = new Date();
  const dateStr = now.toLocaleDateString('de-DE', { day:'2-digit', month:'long', year:'numeric' });

  // ── Colors & helpers ──
  const C = { bg:[8,8,16], surface:[16,16,30], accent:[0,212,255], accent2:[232,200,74],
               green:[0,201,122], red:[255,61,90], text:[232,232,240], muted:[85,85,112] };

  const setFill = (rgb) => doc.setFillColor(...rgb);
  const setDraw = (rgb) => doc.setDrawColor(...rgb);
  const setTxt = (rgb)  => doc.setTextColor(...rgb);
  const W = 210, H = 297;

  // Background
  setFill(C.bg); doc.rect(0,0,W,H,'F');

  // Header bar
  setFill(C.surface); doc.rect(0,0,W,22,'F');
  setTxt(C.accent); doc.setFont('helvetica','bold'); doc.setFontSize(18);
  doc.text('🎯  DART STATISTIKEN', 14, 14);
  setTxt(C.muted); doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text(`Erstellt am ${dateStr}`, W-14, 14, { align:'right' });

  // Divider
  setDraw(C.accent); doc.setLineWidth(0.4); doc.line(14, 24, W-14, 24);

  let y = 32;

  // ── Player stat cards ──
  const getPS = (name) => {
    const p = stats.players?.[name] || {};
    const gc = (p.wins||0)+(p.losses||0);
    return { wins:p.wins||0, losses:p.losses||0, games:gc,
      avg: gc>0?Math.round(p.totalAvg/gc*10)/10:0,
      bestGame:p.bestGame||'–', checkouts:p.checkouts||0,
      wr: gc>0?Math.round((p.wins||0)/gc*100):0 };
  };

  const cardW = (W-14-14-8)/2;
  players.forEach((name, i) => {
    const s = getPS(name);
    const cx = 14 + i*(cardW+8);
    // Card bg
    setFill(C.surface); doc.roundedRect(cx, y, cardW, 52, 3, 3, 'F');
    setDraw(i===0?C.accent:C.accent2); doc.setLineWidth(0.3); doc.roundedRect(cx,y,cardW,52,3,3,'S');
    // Name
    setTxt(i===0?C.accent:C.accent2); doc.setFont('helvetica','bold'); doc.setFontSize(11);
    doc.text(name.toUpperCase(), cx+6, y+9);
    // Stats grid
    const items = [
      ['Siege', s.wins, C.green],['Spiele', s.games, C.accent],
      ['Siegquote', s.wr+'%', C.accent2],['Ø/Aufnahme', s.avg, C.text],
      ['Best Game', s.bestGame+' Auf.', C.red],['Checkouts', s.checkouts, C.green],
    ];
    items.forEach(([label, val, color], j) => {
      const col = j%2, row = Math.floor(j/2);
      const ix = cx+6 + col*(cardW/2);
      const iy = y+18 + row*14;
      setTxt(C.muted); doc.setFont('helvetica','normal'); doc.setFontSize(7);
      doc.text(label.toUpperCase(), ix, iy);
      setTxt(color); doc.setFont('helvetica','bold'); doc.setFontSize(13);
      doc.text(String(val), ix, iy+7);
    });
  });
  y += 60;

  // ── Charts via canvas snapshot ──
  const snapChart = async (canvasId) => {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return null;
    return canvas.toDataURL('image/png');
  };

  // Wins chart
  const winsImg = await snapChart('chartWins');
  if (winsImg) {
    setFill(C.surface); doc.roundedRect(14, y, W-28, 58, 3,3,'F');
    setTxt(C.muted); doc.setFont('helvetica','bold'); doc.setFontSize(8);
    doc.text('SIEGE VS NIEDERLAGEN', 20, y+7);
    doc.addImage(winsImg,'PNG', 18, y+10, W-36, 44);
    y += 64;
  }

  // Avg chart
  const avgImg = await snapChart('chartAvg');
  if (avgImg) {
    setFill(C.surface); doc.roundedRect(14, y, W-28, 58, 3,3,'F');
    setTxt(C.muted); doc.setFont('helvetica','bold'); doc.setFontSize(8);
    doc.text('Ø PRO AUFNAHME – VERLAUF (LETZTE 10 SPIELE)', 20, y+7);
    doc.addImage(avgImg,'PNG', 18, y+10, W-36, 44);
    y += 64;
  }

  // ── Recent games table ──
  if (y < 240) {
    setTxt(C.muted); doc.setFont('helvetica','bold'); doc.setFontSize(8);
    doc.text('LETZTE SPIELE', 14, y+6); y+=10;
    // Header
    setFill(C.surface); doc.rect(14, y, W-28, 7, 'F');
    setTxt(C.accent); doc.setFont('helvetica','bold'); doc.setFontSize(7);
    ['Datum','Sieger','Verlierer','Modus','Aufnahmen','Ø Sieger'].forEach((h,i)=>{
      doc.text(h, 16+i*30, y+5);
    });
    y+=7;
    stats.games.slice(-8).reverse().forEach((g,i) => {
      setFill(i%2===0?C.bg:C.surface); doc.rect(14,y,W-28,7,'F');
      setTxt(C.text); doc.setFont('helvetica','normal'); doc.setFontSize(7);
      const row = [
        new Date(g.date).toLocaleDateString('de-DE'),
        g.winner, g.loser, `${g.startScore}`, `${g.winnerTurns}`, `${g.winnerAvg}`
      ];
      row.forEach((v,ci) => doc.text(v, 16+ci*30, y+5));
      y+=7;
    });
  }

  // Footer
  setFill(C.surface); doc.rect(0,H-12,W,12,'F');
  setTxt(C.muted); doc.setFont('helvetica','normal'); doc.setFontSize(7);
  doc.text('Dart Scorer App · Persönliche Statistiken', 14, H-4);
  doc.text(`Seite 1`, W-14, H-4, {align:'right'});

  doc.save(`dart-stats-${now.toISOString().slice(0,10)}.pdf`);
}
</script>
